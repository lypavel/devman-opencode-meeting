<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Memory</h1>
    <div class="controls">
      <span>Ходов: <strong id="moves">0</strong></span>
      <span>Время: <strong id="timer">00:00</strong></span>
      <button id="new-game">Новая игра</button>
    </div>
    <div class="board" id="board"></div>
    <div id="win-message" class="win-message hidden"></div>
  </div>
  <script src="game.js"></script>
</body>
</html>
